<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GRC — Starting</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
    }

    .shell {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.7);
      position: relative;
      overflow: hidden;
    }

    /* subtle decorative ring */
    .shell::before {
      content: "";
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      border: 1px solid rgba(82, 130, 255, 0.12);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .shell::after {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 1px solid rgba(82, 130, 255, 0.08);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Logo / icon area */
    .logo-wrap {
      position: relative;
      width: 72px;
      height: 72px;
    }

    .logo-bg {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #5282ff 0%, #7c4dff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(82, 130, 255, 0.4);
    }

    .logo-text {
      font-size: 26px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -1px;
      user-select: none;
    }

    /* App name */
    .app-title {
      text-align: center;
      color: #e8eaf6;
    }

    .app-title h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .app-title p {
      font-size: 12px;
      color: #7986cb;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Spinner */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(82, 130, 255, 0.2);
      border-top-color: #5282ff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 13px;
      color: #7986cb;
      letter-spacing: 0.4px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 1;   }
    }

    /* Version badge */
    .version {
      position: absolute;
      bottom: 14px;
      right: 18px;
      font-size: 10px;
      color: rgba(121, 134, 203, 0.5);
      letter-spacing: 0.6px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-bg">
        <span class="logo-text">GRC</span>
      </div>
    </div>

    <!-- Title -->
    <div class="app-title">
      <h1>GRC</h1>
      <p>Global Resource Center</p>
    </div>

    <!-- Spinner + status -->
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <span class="status">Starting server&hellip;</span>
    </div>

    <span class="version">v1.0.0</span>
  </div>
</body>
</html>
