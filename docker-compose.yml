# ─────────────────────────────────────────────────
# GRC Docker Compose — Local Development Support
#
# Services:
#   redis          — Cache + session store
#   meilisearch    — Full-text search engine
#
# Note: GRC Server (frontend:3200, backend:3100) runs locally
# Note: MySQL runs on Azure (13.78.81.86:18306)
# ─────────────────────────────────────────────────

version: "3.8"

services:
  # ── Redis 7 ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grc-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Meilisearch (Full-text search) ───────────────
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: grc-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_KEY:-grc-meili-secure-key-2026}
      - MEILI_ENV=production
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  redis_data:
  meili_data:
