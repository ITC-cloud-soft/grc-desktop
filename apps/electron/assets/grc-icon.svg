<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded rectangle background -->
  <rect x="16" y="16" width="224" height="224" rx="40" ry="40" fill="url(#bgGrad)" />

  <!-- Subtle inner highlight -->
  <rect x="16" y="16" width="224" height="112" rx="40" ry="40" fill="#FFFFFF" opacity="0.06" />

  <!-- "GRC" text -->
  <text
    x="128"
    y="152"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="88"
    font-weight="700"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="-2"
  >GRC</text>

  <!-- Thin accent line below text -->
  <rect x="56" y="168" width="144" height="4" rx="2" fill="#42A5F5" opacity="0.8" />
</svg>
